body:
  text: 沙門曇昉集第一章四波羅市迦法不淨行學處第一起心欲作不淨行時責心惡作不與取學處第二但起惡念責心惡作若是人物傍生所偷人想取之波羅市迦若盜傍生物作傍生想者窣吐羅初為貸借後欲不還決絶之時波羅市迦被賊偷物已作捨心重奪彼財波羅市迦是故不應倉卒輒為捨意後見應取有病苾芻遣人持物心希福利供養僧伽不依彼言隨情處分窣吐羅弶羂網罩所繫有情及賊偷牛繫之於柱懷悲愍解者惡作凡授事人閉寺門時有其五別謂上下轉鳴鎖并副鎖門關及扂不閉賊偷準事酬直若闕一者應還一分乃至若總不著即應全償若有主物作無主想若己物想或暫用心或告他知或親友意者無犯斷人命學處第三若見有情或被水漂火燒或時渴逼不手接不與水見其欲死有力能救或雖不願死作捨受心而不救者彼若命終惡作病人報言莫扶我起強扶令起若彼死者窣吐羅於餘威儀類斯應識現有宜食與不宜者看病之人窣吐羅若無別可得者無犯妄説自得上人法學處第四若云有苾芻如是事然不自言我即是彼內有詐情矯陳密説窣吐羅言所陳事以身相表問時默然波羅市迦第二章十三僧伽伐尸沙法故泄精學處第一觸女學處第二説鄙惡語學處第三索供養學處第四媒嫁學處第五若言此男何不為入舍壻若言此女何不事姑若言此男何不別室但是片言與媒事相應所有言説皆惡作造小房學處第六造大寺學處第七凡出家者於諸利養皆悉不合越分貪求凡是僧伽臥具受用之時不得隨宜將輕小坐具及垢膩疏薄惡物而為襯替若不爾者惡作無根謗學處第八無見聞疑三根以波羅市迦法謗他苾芻僧伽伐尸沙若於大衆作如是言於中有人犯波羅市迦不斥名謗窣吐羅假根謗學處第九破僧違諫學處第十助伴破僧違諫學處第十一汙家違諫學處第十二惡性違諫學處第十三第三章二不定法第四章三十泥薩祇波逸底迦法有長衣不分別學處第一長仗音餘也多也得長衣不分別過十日泥薩祇波逸底迦長衣者謂受持十三資具衣外所得之衣若分別者無犯浣衣可自為之浣衣之家亦不應往或令可信之人浣之勿不用心令衣有損置衣時三衣在上餘衣在下用意防守如護身皮欲令施主得福多故令受用者無闕乏故離三衣學處第二三衣守持已向界外去離衣宿經明相時捨墮有緣入村坊內應持一割截衣若不入村者不持無犯若不將尼師旦那不應往餘寺宿若有礙緣應借而臥一月衣學處第三使非親尼浣故衣學處第四凡著衣服應捨三種心生五種心言三種者一喜好玩飾心二輕賤受用心三矯覓名稱心後謂詐著弊衣欲令他知有德有行希招利譽如是三心皆不應作但求壞色趣得充身順大師教進修善品言五種心者一知量二知間隙三知思察四知時五知數言知量者受用衣時知其新舊量度而用徐徐緩牽勿使傷損後求難得言知間隙者不可頻頻常著一衣臭而疾破可間用之言思察者心常思察此衣來處極難非自臂力由他施己作報恩心受用之時勿為非法言知時者寒熱適時受用合度若乖時節自損損他自損者不益己身損他者福不增長言知數者十三資具足得資身多畜貯求長貪廢業取非親尼衣學處第五從非親居士居士婦乞衣學處第六過量乞衣學處第七知俗人許與衣就乞學處第八勸共作衣學處第九過限索衣學處第十若諸苾芻畜私銅器者謂銅盤銅碗釜鑊瓫器惡作匙及飲水器并安鹽盤子衣鉢臥具病藥所須別人應畜用野蠶絲作敷具學處第十一用純黑羊毛作敷具學處第十二過分數作敷具學處第十三減六年作新敷具學處第十四作新尼師但那不用故帖學處第十五佛一張手當一肘半由其重帖遂令受用久堅牢故若減不成帖捨墮自擔羊毛過三踰膳那學處第十六使非親尼治羊毛學處第十七捉金銀等學處第十八若自捉若教他捉捨墮若淨施者作施主物想執捉無犯出息求利學處第十九以錢等而規其利息未獲之時惡作得時捨墮若他將苾芻物為生利時苾芻貪利默而不止得利之時捨墮賣買學處第二十於俗人作市易處不應自酬價直應令敬信俗人或使求寂為買無犯若無此者應自酬直或二或三而還其價不應過此共為高下畜長鉢過十日不分別學處第二十一凡安鉢處若在寺中應為龕窟乞鉢學處第二十二自乞縷使非親織師織作衣學處第二十三勸非親織師織衣學處第二十四奪衣學處第二十五過後畜急施衣學處第二十六在阿蘭若處過六夜離衣學處第二十七預前求過後用雨浴衣學處第二十八回衆物入己學處第二十九或時將食擬施貧寒及以傍生轉惠餘者乖本心故惡作求不得者無犯知與衆物自回入己下至一線縫著其衣此衣即須全將入捨若亡人寄物即於物所在處僧伽共分有五種受用人一是主受用謂無學人二父母財受用謂有學人三隨聽受用謂持戒者四負債受用謂懶惰輩五盜賊受用謂破戒人何謂破戒謂四重中隨犯一事於諸飲食一口不銷於僧伽地不容一足本律云知屬僧伽物乃至一二三苾芻物展轉相回或互回回時得惡作得時亦惡作又云或知與此寺回與彼寺乃至房廊柱門等展轉相回或互回亦如是又云若與此貧人物回與彼貧人與此傍生食回與彼傍生得惡作罪若覔不得回與無犯又云若擬與傍生物回將與人擬與人物回與傍生得惡作罪又云若與出家物回與俗人或復翻此得惡作罪若覔不得者無犯服過七日藥學處第三十病苾芻服食酥油糖蜜於七日中應自守持觸宿而服過者捨墮糖等時與非時病及無病食皆無犯作粆糖團須安麨末是作處淨非時得食若甘蔗非時受取非時料理雖濾守持並不應食應時中料理時中受取對人加法齊更得飲於藥所須器具雜物亦皆聽畜若寺內無淨地處與食同宿內煮自煮皆不應食飲噉之時皆惡作罪第五章九十波逸底迦法故妄語學處第一起心欲誑責心惡作實見見想而言不見波逸底迦若前人未解者惡作實見生疑便云我見或云不見惡作實不見生疑便云我見惡作實不見有見想云我見無犯佛之弟子言常説實不應為盟自雪表他不信故設被誣謗亦不應作誓或時忘一餘皆不忘或時疑一餘皆不疑參雜而説意欲迷彼亦得本罪本律云爾時世尊復告羅怙羅曰於汝意云何何意世人手執明鏡羅怙羅白佛言世尊彼執鏡者為觀己面善惡之相佛告羅怙羅如是如是中略汝之所有身業造作應當數數善自觀察我曾已作如是身業此之身業能害自他當受苦報所有罪業應對佛前至誠懇惻説所作罪或於清淨同梵行者前説其愆咎發露説悔將來禁戒更不重犯若作善業能益自他當受樂報應發歡喜心於日夜中慶其所作勿為放逸羅怙羅如於身業欲作正作已作三時觀察當知語業意業亦復如是羅怙羅當知過去未來及以現在所有行業皆由意生應數觀察棄捨妄念常起善心羅怙羅若有沙門婆羅門等於身語意業現起之時應善觀察令極清淨常多修習相應而住羅怙羅如於現在觀察三業令極清淨相應而住過去未來亦復如是是故汝今於三業中恆善觀察令極清淨相應而住勿為放逸又云云何妄語得波羅市迦若苾芻實不得上人法自稱言得云何妄語得僧伽伐尸沙若苾芻知彼苾芻清淨無犯以無根他勝法謗云何妄語得窣吐羅底若苾芻在僧衆中故心妄語非法説法法説非法非律説律律説非律云何妄語得突色訖里多若苾芻半月半月作褒灑陀誦戒經時彼問清淨否而實不清淨自知有犯作覆藏心默然而住除向所説四種妄語諸餘妄語悉得波逸底迦毀訾語學處第二作毀訾意或由瞋忿或因傲慢於苾芻處八種毀訾不問虛實前人生恥不生恥若領解時波逸底迦廣如律文所説或先非惡心錯誤而説或為教誨意或作饒益心無犯本律云是故常愛語勿作逆耳言若出愛語時無罪常安樂又云毀訾語者謂於他人為毀辱事出言彰表離間語學處第三作惡心令他離間而發其語或求資生或作無益或性嫉妬或為福業事謂讀誦依止等波逸底迦或作利益心或於惡友令其離間無犯發舉殄諍羯磨學處第四與女人説法過五六語學處第五無犯者對有智男子或在家人或出家者又有釋云設對女人説亦無犯與未近圓人同讀誦學處第六法謂十二分教又有説云此中法者謂與毗奈耶相應之法既遮未具具便非犯有五種人不應為説毗奈耶藏謂性無所知強生異問或不為除疑而發於問或試弄故問或惱他故問或求過失故問説法之師若他不請輒為人説惡作向未近圓人説他粗罪學處第七言粗惡者謂初二部及彼方便此中意顯與淫相應自性方便是雜染故名為粗惡彼俗家先不知為不知想疑以苾芻粗惡罪而告語者波逸底迦他若先知為不知想疑而告語惡作除與淫欲相應之罪以餘犯事及壞見等而告語他或於自身有粗惡罪向未近圓説或告他時他不領解皆惡作雖得衆法於已知人有私忿心而向説者亦得惡作由此應知出家之人所有言説皆為利益不應私忿道説於他實得上人法向未近圓人説學處第八謗回衆利物學處第九輕呵戒學處第十若於十七事尼陀那目得迦處增五增六增十六摩納毗迦處及於餘經與毗奈耶相應之事而輕呵者皆波逸底迦若不與此毗奈耶相應經教而輕呵者惡作壞生種學處第十一若苾芻於諸種子及生草木有種子生草木想或復生疑而以刀爪及持甎石水火杵木灰汁沸湯或是水生出令乾死或牽柴所損或經行處以足踏傷隨以何緣或自或他故為壞損者波逸底迦若不傷者惡作若樹葉新生及皴朽皮若花已開或萎黃葉或成熟果損落此者惡作若活根若青葉若生皮花未開果未熟者波逸底迦若青苔浮萍等水中搖動惡作舉出水時波逸底迦若地甎石有緑苔生蛇蓋菌等而損壞者或竿笐瓶衣生白醭而受用損動者惡作令他拂淨者無犯諸有情村有生命居者隨損得罪若欲移諸生命者應極詳審勿令傷損若行動時及有牽曳傾瀉湯水并灑掃時無損害心雖損無犯諸根種及以果菜應合淨者先作淨已後方食用淨法有五種火淨刀淨蔫淨鳥淨爪淨又有五淨墮破淨拔出淨捩斷淨擘破淨非種淨若蒲萄瓜果總為一聚於三四處以火拄之此便為淨若刀爪一一皆須別淨又生種中但有損者此即是淨然於種中有不熟種被蒸煮已食皆非犯若苾芻自將刀等而作淨者食時無犯不淨得波逸底迦若以火淨有自煮過然於不淨地中又有內煮過並不應食使他淨時內煮同自嫌毀輕賤學處第十二若於善人作善人想疑嫌毀者波逸底迦若於惡人作非惡人想疑嫌毀者惡作違惱言教學處第十三他人問時乃至片有惱心詭誑異説或時默然若對僧伽及清淨苾芻違惱教時波逸底迦或他問時先語後默者惡作若於僧伽及尊重類稱理之教垢心違惱波逸底迦非稱理教作違惱言惡作僧伽教敕遣作此事為彼事者波逸底迦於稱理教稱理想疑違皆波逸底迦不稱理教作稱理想疑惡作若稱理教作不稱理想雖違無犯若於不解語人而違惱者惡作若違惱賊教者惡作賊遣作食應可為辦有教須違謂非理虛誑所有言説有教須為捨受謂彼非理帶瞋而言有教應反開悟謂非理不瞋言有教當如説行謂有犯令悔言有教須順從謂令持戒言若口雖不語身惱他時遣去不去不遣去而去喚來不來不喚而來有垢心者波逸底迦無垢心者惡作若差知衆事以垢惡心應作不作不應作而作波逸底迦無垢心者惡作本律云善友利益言若不能依用墜落受辛苦猶如放杖鱉不舉敷具學處第十四若僧伽牀座被褥枕囊小褥等安於露地去時不自舉不囑授者波逸底迦若初去時忘中路方憶者責心惡作若是己物不舉者惡作若用僧伽敷具有損壞者不應默然捨不料理有破穿處應須縫補若斷壞者應為連接每月八日十五日草三日月盡日應觀臥具拂拭曬曝苾芻若見火燒寺時先出自己所有衣鉢其次當出常住資財令無力人一處看守其火若盛不應輒入大水來漂亦應準此由失自財交有廢闕設損衆物不同斯苦如上所制違不行者並得惡作本律云於他信施物知量而受用自身得安隱令他福德增不舉草敷具學處第十五牽他出僧房學處第十六若於住處龍蛇忽至應可彈指而語之曰賢首汝應遠去勿惱苾芻若告已不去者應持軟物而羂去之勿以毛繩等繫勿令傷損於草叢處安詳解放待入穴已然後捨去若棄蚤蝨等不可隨宜輒便棄地應於故布帛上觀時冷熱而安置之此若無者應安壁隙柱孔任其自活如前所制不依行者咸得惡作強惱觸他學處第十七故心惱苾芻於禮敬時生苦或承事時供養時看病時請教時讀誦時咨問時與欲時飲食時受施時坐臥等時悉皆生苦但使發心作惱他意令他生苦於僧住處波逸底迦於餘住處惡作故放身坐臥脫腳牀學處第十八用蟲水學處第十九總有二種蟲一謂眼見二謂濾得斯等濾用或可去蟲或取無蟲處用或可信人言水無蟲斯並無犯縱無蟲水不應輒棄得惡作應須散灑或向竇邊齊一肘來是其傾處本律云河池水處多有蟲魚苾芻殺心決去其水隨有蟲魚命斷之時皆得墮罪若不死者皆得惡作又云若於此水處偃之令斷於其下畔隨蟲命斷或時不死得罪同前又云若無殺心者無犯造大寺過限學處第二十衆不差教授苾芻尼學處第二十一教授至日暮學處第二十二謗他為飲食故教授學處第二十三與非親尼衣學處第二十四與非親尼作衣學處第二十五與苾芻尼同道行學處第二十六凡涉路時應為法語勿出惡言或為聖默然勿令心散亂與苾芻尼同乘一船學處第二十七近圓男與未近圓女結伴乘船惡作獨與女人屏處坐學處第二十八獨與尼屏處坐學處第二十九知苾芻尼讚歎得食學處第三十展轉食學處第三十一為求肥盛或樂美食而數食者惡作若輕賤心或懷矯詐而不食者惡作施一食過受學處第三十二過三鉢受食學處第三十三足食學處第三十四足食竟者謂食五正食飽足作遮止言心生棄捨而從座起如是若更食者波逸底迦若作餘食法食者無犯若先食五嚼食後食五正食無犯勸足食學處第三十五別衆食學處第三十六此言食者謂是正食餘食非犯若四苾芻食同一界內餘有一人不共同食波逸底迦本律云凡言住處有二種一根本住處二院外住處若於本處苾芻食時應問院外苾芻來同食否若不問而食者得惡作罪若院外苾芻食時應問本處苾芻來同食否若不問知四人同食者得波逸底迦若三人食一人不食若三圓具一未圓具食皆無犯若以食送彼乃至鹽一匕或草葉一握與彼衆處食皆無犯非時食學處第三十七於非時作非時想疑若噉咽時波逸底迦時非時想疑惡作苾芻唯著下裙上無衣者不應噉食食時踞坐好整威儀不應顧視當生厭想住於正念無掉亂心然後方食若異此者惡作若食脆硬餅果不應作聲應須潤濕薄粥啜欱不得作聲若蘿蔔等擘破應食食曾觸食學處第三十八曾經觸者謂是自手先曾執捉或留經夜擬自噉食然曾經觸限分有其二種一謂中前從他受得齊日中時二謂中後受得齊初夜時過此限分若更食者波逸底迦若不受而觸齊時分內食者惡作是名輒觸亦名惡觸若過時分又得曾觸波逸底迦若苾芻於三處有曾觸過謂由僧祇及由苾芻并授學人望二種人無曾觸過一無羞恥人謂不畏罪二有羞慚忘失正念若曾觸鉢匙盞鉢袋并支伐羅水瓶錫杖乃至戶鑰相染觸物及以觸口觸手而飲噉者咸得波逸底迦苾芻若欲飲水噉食時與非時皆須以水再三漱口方可飲噉若不爾者惡作若是病人無可得處曾觸酥等食亦無罪凡飲非時漿先須洗手嗽口令淨然後飲之若異此者惡作本律云若諸苾芻曾所觸鉢未好淨洗若小鉢若匙若銅盞若安鹽器而用飲用食者皆得波逸底迦罪又云若手觸鉢袋若拭巾錫杖若戶鑰及鎖如是等物若觸捉已不淨洗手捉餘飲食乃至果等吞咽之時皆得波逸底迦罪不受食學處第三十九若是病人無人可得不受無犯穢處螥蠅觸食非犯有三種事應在屏處謂大小便及嚼齒木棄齒木及洟唾等應於屏處再三彈指謦咳然後方棄若食已了乃至未將淨水洗漱口內食津不應輒咽食謂正食違者波逸提迦索美食學處第四十受用有蟲水學處第四十一齊幾許時應觀其水謂六牛竹車回轉之頃或心淨已來觀知無蟲設不濾漉飲亦無犯不觀不濾咸不合用若苾芻無濾羅等不應往餘村餘寺齊三拘盧舍若所到之處知無闕乏不持去者無犯謂知彼僧祇恆有淨水若於河井先知無蟲羅須淨洗曬曝令乾有食家強坐學處第四十二有食家強立學處第四十三與無衣外道男女食學處第四十四本律云云何汝身不陷地云何舌不百片裂云何諸神見此事不以霹靂破汝身野干每食師子殘而常有念害師子十力聖衆以食濟汝今見罵不知恩彼定證得一切智於友非友心平等汝等外道可惡人尚亦相依蒙濟給若人不識恩與義當知此類不如狗狗於人處解施恩汝似惡蛇常吐毒觀軍學處第四十五軍中過二宿學處第四十六動亂兵軍學處第四十七打苾芻學處第四十八以手擬苾芻學處第四十九若與苾芻相瞋恨時應往詣彼求其懺摩不應瞋心未歇往求辭謝彼亦不得同師子行為堅硬心不相容恕若不肯忍應遣智人方便和解速令諍息小者到彼瞋苾芻邊至勢分時即應禮拜彼應云無病若見苾芻門諍之時應無朋黨心而為揮解覆藏他粗罪學處第五十無犯者若説他時令自不安共至俗家不與食學處第五十一觸火學處第五十二無犯者謂在時中作心守持言時者謂為三寶塢波馱耶阿遮利耶若為餘諸同淨行者所有事業或時為己熏鉢染衣熟諸飯食或寒或病所有營為作心守持乃至事訖中間忘念觸時無犯言守持心者若欲觸火應心念云我今為作如是事故須觸此火及為同梵行者若欲滅時應云為無事故須滅與欲已更遮學處第五十三與未近圓人同室宿過二夜學處第五十四凡臥息時右脅著牀兩足重疊身不動搖作光明想安住正念情無嬈惱衣服不亂於睡知量念當早起初夜後夜恆修善品此是沙門眠息之法若無病苦晝不應臥不捨惡見違諫學處第五十五隨捨置人學處第五十六攝受惡見求寂學處第五十七著不壞色衣學處第五十八下至拭鉢巾拂足巾鉢袋濾羅腰絛等咸須壞色點淨而畜本律云若無清淨心而懷瞋恨意不能解諸佛所説微妙法降伏鬥諍心及無不淨意能除於忿害方解微妙法捉寶學處第五十九若在寺內及白衣舍見寶及寶類應作是念然後當取若有認者我當與之非時浴學處第六十初開半月浴因大熱時後聽隨意更開病等皆非是犯若洗浴時要須心念受持我今欲浴在何時中然後方浴不作時心受持而浴者從上澆水流至於臍若入河池水過臍上波逸底迦苾芻住處咸須淨掃處若寬大修治難遍者當於要用處而掃拭之佛堂制底及幡幢竿須蹈影過宜誦伽他若剃髮者亦在時攝不應裸體而浴可畜浴裙若無裙者應以樹葉掩身屏處而浴如上所説不順行者咸惡作殺傍生學處第六十一若苾芻以自身手若持器仗或擲餘物作殺心而打者或當時死或後命終皆得波逸底迦若不死者得惡作故惱苾芻學處第六十二若作饒益心隨順律教以理開導者皆悉無犯以指擊攊他學處第六十三水中戲學處第六十四與女人同室宿學處第六十五恐怖苾芻學處第六十六藏他衣鉢學處第六十七他寄衣不問主輒著學處第六十八以衆教罪謗清淨苾芻學處第六十九與女人同道行學處第七十與賊同道行學處第七十一與減年者受近圓學處第七十二有二種塢波馱耶一初與出家二為受近圓滿足十夏方住師位復須成就五法一知有犯二知無犯三知輕四知重五於別解脫經廣能開解於諸學處創結隨開若遇難緣善知通塞常誦戒本能決他疑戒見多聞自他俱利威儀行法無有虧犯具如是德名親教師由其親能教出離法故若苾芻雖近圓已於諸學處不識重輕設六十夏仍須仗託明德依止而住禮敬之儀有其二別一謂五輪著地二謂執捉腨足口云畔睇有説禮大師時五輪至地若尊及尊類應手膝至地或時曲躬低頭合掌或捉腨或蹲踞合掌若對所餘同梵行者若但合掌或復低頭或口云畔睇若知他身有穢觸而為禮敬或自身有穢觸而禮他者俱得惡作有二種觸穢一食竟未澡漱時觸二便利未洗淨時觸出家苾芻不應懷恨設有嫌隙者小近大時即須唱畔睇而禮拜大者見禮即云願無病惱如兩不言者俱得惡作若唯著下裙無上衣者不合禮他亦不受禮違而受者俱惡作大者喋時小云畔睇小者若喋大云阿路祗若不言者俱得惡作暗中禮拜不應至地口云畔睇即是致敬既近圓竟滿十夏已來在親教師邊受學律藏及餘經論等若親教師有緣不及自教者應令別仗明德可委付人依之而住若滿五夏五法明解識犯非犯知重知輕別解脫經善知通塞得離本師及依止師遊方習業所到之處經二三日且自停息次當觀察誰可為師應就依止若無依止不應停住設阿羅漢亦須依止況復異生壞生地學處第七十三生地者謂未曾掘若曾經掘被天雨濕若餘水霑時經三月是名生地若無雨濕及水霑潤時經六月亦名生地若苾芻知是生地不被火燒未經耕墾自掘教人掘若打橛若剗削堅硬地皮崩岸隤牆著地堅泥舉令相離若土多沙少者咸得波逸底迦若地皮等不堅硬處剗舉之時惡作過四月索食學處第七十四遮傳教學處第七十五默聽評論學處第七十六若知諸苾芻在於上閣有所論説須欲往者應彈指或謦咳作聲者無犯若默而去聽彼言説初聞聲時便得惡作若解其義即獲波逸底迦若在中閣若在簷前若在經行處等亦如是若情無向背若忽遇聞此皆無犯不與欲默然起去學處第七十七不恭敬學處第七十八復有餘説不敬之事謂法事佛事若尊人若弟子若人主若流俗於如是等不生恭敬若語若默有如法言不相順從若身語心隨其所應不敬之時各依輕重而得其罪言法事者先觀自身戒清淨否若讀誦教授施他法義如理作意靜慮相應如是等事隨所應作而不奉行心常懶惰不修善品不敬於戒話無益言皆得波逸底迦言佛事者謂於尊像不勤禮敬制底香臺不時掃拭若見隤落有力能為而不修補所應作事懈慢不為波逸底迦下略若作輕慢心欲惱他者凡有所為咸得惡作飲酒學處第七十九非時入聚落不囑苾芻學處第八十若無苾芻囑餘俗人者無犯食前食後詣餘家學處第八十一入王宮學處第八十二不攝耳聽戒作不知語學處第八十三不恭敬者是總標句不住心者是別釋句顯六過失謂無信心失無敬心失無樂欲失緣外境失心惛沈失生勞倦失如是次第而配屬之用牙角作針筒學處第八十四過量作牀學處第八十五注云言中人一肘者長笏尺一尺五寸過此是高牀量用皆得罪草木綿貯牀學處第八十六過量作尼師但那學處第八十七本律云若佛一張手當中人三張手總長九張手合有四肘半廣一張手半者當中人四張手復有六指原注云此中制意者尼師但那本為襯替臥具恐有所損不擬餘用然其大量與自身等頂上餘有一磔手在斯乃正與臥具相當又復佛望餘人身有三倍言一倍者蓋是部別若依二倍即尼師但那其量全小不堪替臥敷地禮拜不見有文故違聖言誰代當罪過量作覆瘡衣學處第八十八過量作雨浴衣學處第八十九與佛等過量作衣學處第九十第六章四波羅底提舍尼法從非親尼受食學處第一受尼指授食學處第二學家受食學處第三阿蘭若住處外受食學處第四第七章衆學法衆學法者謂於廣釋及十七事中所有衆多惡作惡説咸悉攝在衆學法中不以鏡及水為好觀面觀蟲之時見面無犯若看面瘡痕若看頭白面皺觀知前後容顏改變生厭離想此皆無犯於諸善品不應懶惰出入門戶咸須用心開閉之時不應造次若經行時勿緩勿急如是等於律所説不依行者咸得惡作言整齊者離不整齊著衣之過少語言者不應同俗多作言説不大叫呼如童兒類不高視者舉目視前一踰伽地是為視量踰伽量者長四肘也不應旁視亦不回顧端形直視徐行而進牛馬犬等應預觀察不應逼近恐有傷損凡是行步非大人相者皆應遠離不壘足者不以一腳重於腳上壘之而坐不重內踝者謂不正身重踝而坐不重外踝者準事應知恭敬受食者凡受食時極須存念不應寬慢致令鉢破不得滿鉢受飯者受食之時應觀其鉢勿令流溢所有羹菜不應多請後安飯時恐溢出故食在口中不應言説同白衣法羹飯不得互掩覆者意欲多求長貪心故應於飲食生厭離想是為出家所應作事隨得隨食少欲為念繫心而食充軀長道不得觀他生嫌賤心汙手捉淨水者謂食所霑及不淨所汙凡欲食噉皆須土屑澡豆等淨洗手已方捉食器飲器及淨水瓶若青草上好樹下及花果樹人所停息者不應大小便若棘刺叢處者無犯若大林中行枝葉交茂應離人行處若涉生草田間無空處應持乾葉布上便利若無可得者無犯初入廁時作聲謦咳或時踏地或復彈指大小行訖乃至未將淨水漱口不受他禮亦不禮他不坐牀座及噉飲食違者皆得惡作若泄下氣勿使作聲於廁屋內若上座前若在淨地及對食者皆不洟唾凡洟唾時勿作大聲亦不應數若多唾者應向屏處若有病緣聽安承器若沙若石及草土等安在器中勿使灒溢應數洗之無令臭氣不得水中者若水闊應於木上若無可得同上草田第八章七滅諍法復次既識於諍及除滅事苾芻要行伏煩惱法依阿笈摩教當略言之此別解脫經統明首末體義大綱要有十事謂止息忍證依仗僧伽淨信女人資生受用苾芻苾芻尼俗人之事取食受請威儀軌範共相詰事若苾芻依此十事修行之時由二種煩惱而生其犯一遠二近遠者謂由忘失正念追尋昔事而起煩惱作其罪業近者謂煩惱心忽然自起於現前事作其罪業時彼苾芻知其因已應當遠離如避火坑順理作意令因不起若彼煩惱以自心力不能除者應就尊宿及間三藏有德行人請對治法作意除遣仍不除者當於晝夜讀誦聞思簡擇其意於三寶所及師長處至誠供養忘自劬勞或向他方或減食等令彼煩惱不復現行仍不除者當往尸林獨居蘭若修不淨觀為四念處無常等想仍不除者應生慚恥作如是念我所為非戒不清淨不能一一如法護持而復受他四事供養諸佛世尊及得天眼諸同梵行并天神等悉遙見我知我破戒為此不應起煩惱心造諸惡業當自剋責如救頭然於清淨境説除所犯勿致後悔如上所説不能依行及受信心所有衣食皆得惡作罪若作如斯對治行時性多煩惱未能殄息仍起染心雖受信施亦無有犯當自審察雖作種種折伏方便然煩惱心不能除者即應捨戒歸俗而為白衣勿令有罪受他信施此諸惡業定感當來惡異熟果如增三經廣説其事附録寄歸傳云言五時者一謂冬時有四月從九月十六日至正月十五日二謂春時亦有四月從正月十六日至五月十五日三謂雨時但有一月從五月十六日至六月十五日四謂終時唯一日一夜謂六月十六日晝夜五是長時從六月十七日至九月十五日此乃獨於律教中佛制如是次第明有密意也若依方俗或作三時四時六時如餘處説百一羯磨注云此是西方衆僧要法若不解者即非苾芻但為比來未翻致令聞者不悟此謂佛家密教與俗有殊若至西國他問不知人皆見笑不同支那記月而已又云若前安居謂五月黑月一日安居舊云坐夏或云坐臘西方之制以黑前白後合為一月月虧至晦謂之黑月亦名黑分月盈至滿謂之白月亦名白分黑月或十四日或十五日月有大小故也今云五月黑月一日即當此土五月十六日後安居則六月黑月一日唯斯兩日合作安居於其中間文無許處至八月半是前夏了至九月半是後夏了此時法俗盛興供養從八月半已後名歌栗底迦月江南迦提設會正是前夏了時八月十六日即是張羯絺那衣日斯其古法玄奘三藏西域記云印度僧徒依佛聖教皆以室羅伐拏月前半一日入雨安居當此五月十六日以頞濕縛庾闍月後半十五日解雨安居當此八月十五日印度月名依星而建古今不易諸部無差良以方言未融傳譯有謬分時計月致斯乖異故以四月十六日入安居七月十五日解安居也又云諸部流派生起不同西國相承大綱唯四一聖大衆部即僧祇律分出七部二聖上座部分出三部三聖根本説一切有部分出四部四聖正量部分出四部然而部執所傳多有同異且依現事言其十八分為五部不聞於西國耳故五天之地及南海諸洲皆云四種尼迦耶尼迦耶譯為部又云有部所分三部之別一法護即四分律二化地即五分律三迦攝卑此土僅傳戒本曰解脫戒經此並不行五天唯烏長那國及龜茲于闐雜有行者然十誦律亦不是根本有部也但此與十誦大歸相似又云詳觀四部之差律儀殊異重輕懸隔開制迢然出家之侶各依部執無宜取他輕事替己重條用自開文見嫌餘制若爾則部別之義不著許遮之理莫分豈得以其一身遍行於四裂裳金杖之喻乃表證滅不殊行法之徒須依自部又云且神州持律諸部互牽而講説撰録之家遂乃章鈔繁雜五篇七聚易處更難方便犯持顯而還隱遂使覆一簣而情息聽一席而心退上流之伍蒼髭乃成中下之徒白首寧就律本自然落漠讀疏遂至終身師弟相承用為成則論章段則科而更科述結罪則句而還句考其功也實致為山之勞核其益焉時有海珠之潤又凡是製作之家意在令人易解豈得故為密語而更作解嘲譬乎水溢平川決入深井有懷飲息濟命無由準驗律文則不如此論斷輕重但用數行説罪方便無煩半日此則西方南海法徒之大歸矣又云浮囊不泄乃是菩薩本心勿輕小愆還成最後之唱理合大小雙修方順慈尊之訓防小罪觀大空攝物澄心何過之有或恐自迷誤衆準教聊陳一隅空法信是非虛律典何因見慢又云供身百一四部未見律文雖復經有其言故是別時之意且如多事俗徒家具尚不盈五十豈容省緣釋子翻乃過其百數準驗道理通塞可知又云凡禮拜者意在敬上自卑之義也欲致敬時及有請白先整法衣搭左肩上擪衣左腋令使著身即將左手向下掩攝衣之左畔右手隨所掩之衣裙既至下邊卷衣向膝兩膝俱掩勿令身現背後衣緣急使近身掩攝衣裳莫遣垂地足跟雙豎脊項平直十指布地方始叩頭然其膝下迥無衣物復還合掌復還叩頭殷勤致敬如是至三必也尋常一禮便罷中間更無起義西國見為三拜人皆怪也若恐額上有塵先須摩手令淨然後拭之次當拂去兩膝頭土整頓衣裳在一邊坐或可暫時佇立尊者即宜賜坐必有呵責立亦無傷斯乃佛在世時迄乎末代師弟相傳於今不絶如經律云來至佛所禮佛雙足在一邊坐不云敷坐具禮三拜在一邊立斯其教矣但尊老之處多座須安必有人來準儀而坐凡是坐者皆足踏地曾無帖膝之法也律云應先嗢屈竹迦譯為蹲踞雙足履地兩膝皆豎攝斂衣服勿令垂地即是持衣説淨常途軌式或對別人而説罪或向大衆而申敬或被責而請忍或受具而禮僧皆同斯也或可雙膝著地平身合掌乃是香臺瞻仰讚歎之容矣然於牀上俗云拜禮拜諸國所無或敷氈席亦不見有欲敬反慢豈成道理至如牀上席上平懷尚不致恭況禮尊師大師此事若為安可又云言長跪者謂是雙膝踞地豎兩足以支身舊云胡跪者非也五天皆爾何獨道胡又云而有説云律中臥具即是三衣見制野蠶便生異意剩謂法衣非絹遂即覓布殷勤寧委本文元來是褥百一羯磨注云有以臥具為三衣者雖曰深思誠為臆斷律云臥具乃是眠褥如何割截用作三衣案已上所録悉屬有部之説他部譯本或與是殊南山諸師撰述亦多與此歧異須知各有所長未可是丹非素而南山一派尤深契此土機宜慎勿固執有部之説妄生疑謗也
