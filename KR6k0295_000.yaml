front:
  text: 根本説一切有部毗奈耶犯相摘記凡例毗奈耶藏其文繁博被機至廣今以私臆簡其常應習誦省察者別録一卷以便檢尋他人承用或病其闕略幸披律文詳為增訂有所正焉所録者專宗律攝間有録本律者冠以本律云三字標寫戒目亦依律攝所録事相有與標目不相涉者仍彼原式併列其次所録者以持犯戒相為主釋義之言亦小存録編末附録南海寄歸內法傳數節至為切要後之學者所宜詳覽專習四分律者宜準是編規式別集四分律犯相摘記依之行持檢尋良便歲次玄枵木槿榮月於西安蓮華寺校定根本説一切有部毗奈耶犯相摘記目録第一章四波羅市迦法第二章十三僧伽伐尸沙法第三章二不定法第四章三十泥薩祇波逸底迦法第五章九十波逸底迦法第六章四波羅底提舍尼法第七章衆學法第八章七滅諍法附録
